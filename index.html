<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JG Matchups</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #10141a;
    --surface2: #161c25;
    --border: rgba(180,160,100,0.15);
    --border-hover: rgba(180,160,100,0.35);
    --gold: #c8a84b;
    --gold-dim: #7a6430;
    --win: #4caf7a;
    --win-bg: rgba(76,175,122,0.1);
    --win-border: rgba(76,175,122,0.3);
    --lose: #e05555;
    --lose-bg: rgba(224,85,85,0.1);
    --lose-border: rgba(224,85,85,0.3);
    --even: #7a8fa6;
    --even-bg: rgba(122,143,166,0.1);
    --even-border: rgba(122,143,166,0.3);
    --text: #d8cdb4;
    --text-dim: #6a7585;
    --text-muted: #3d4a57;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    min-height: 100vh;
  }

  /* bg texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .logo span {
    color: var(--text-dim);
    font-weight: 400;
  }

  .rank-badge {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-family: 'Rajdhani', sans-serif;
  }

  /* PICKS SELECTOR */
  .section-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .picks-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .pick-chip {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .pick-chip:hover { border-color: var(--border-hover); color: var(--text); }
  .pick-chip.active {
    border-color: var(--gold-dim);
    background: rgba(200,168,75,0.08);
    color: var(--gold);
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filters {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--text); }
  .filter-btn.f-all.active { border-color: var(--gold-dim); color: var(--gold); background: rgba(200,168,75,0.08); }
  .filter-btn.f-win.active { border-color: var(--win-border); color: var(--win); background: var(--win-bg); }
  .filter-btn.f-lose.active { border-color: var(--lose-border); color: var(--lose); background: var(--lose-bg); }
  .filter-btn.f-even.active { border-color: var(--even-border); color: var(--even); background: var(--even-bg); }

  .add-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1px solid var(--gold-dim);
    border-radius: 2px;
    background: rgba(200,168,75,0.06);
    color: var(--gold);
    cursor: pointer;
    transition: all 0.15s;
  }

  .add-btn:hover { background: rgba(200,168,75,0.14); border-color: var(--gold); }

  /* CARDS */
  .list { display: flex; flex-direction: column; gap: 6px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px 16px;
    transition: border-color 0.15s;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .card:hover { border-color: var(--border-hover); }
  .card.r-win { border-left: 3px solid var(--win); }
  .card.r-lose { border-left: 3px solid var(--lose); }
  .card.r-even { border-left: 3px solid var(--even); }

  .card-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .enemy-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
    flex: 1;
  }

  .vs-label {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-right: 2px;
  }

  .my-pick-tag {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gold-dim);
    border: 1px solid rgba(200,168,75,0.2);
    padding: 2px 8px;
    border-radius: 2px;
    background: rgba(200,168,75,0.05);
  }

  .result-badge {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
  }

  .result-badge.win { background: var(--win-bg); color: var(--win); border: 1px solid var(--win-border); }
  .result-badge.lose { background: var(--lose-bg); color: var(--lose); border: 1px solid var(--lose-border); }
  .result-badge.even { background: var(--even-bg); color: var(--even); border: 1px solid var(--even-border); }

  .tip-text {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
    line-height: 1.6;
    padding-left: 2px;
    border-left: 2px solid var(--text-muted);
    padding-left: 10px;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .act-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .act-btn:hover { color: var(--text); border-color: var(--border-hover); }
  .act-btn.del:hover { color: var(--lose); border-color: var(--lose-border); }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 3rem 0;
    color: var(--text-muted);
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 13px;
  }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--surface2);
    border: 1px solid var(--border-hover);
    border-radius: 4px;
    padding: 1.5rem;
    width: 100%;
    max-width: 460px;
  }

  .modal-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.25rem;
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    display: block;
    margin-bottom: 5px;
  }

  .form-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 8px 10px;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--gold-dim); }

  textarea.form-input { resize: vertical; min-height: 70px; }

  .result-row { display: flex; gap: 8px; }

  .r-opt {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    color: var(--text-dim);
    transition: all 0.15s;
  }

  .r-opt:hover { color: var(--text); }
  .r-opt.sel-win { background: var(--win-bg); color: var(--win); border-color: var(--win-border); }
  .r-opt.sel-lose { background: var(--lose-bg); color: var(--lose); border-color: var(--lose-border); }
  .r-opt.sel-even { background: var(--even-bg); color: var(--even); border-color: var(--even-border); }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 1.25rem;
  }

  .btn-cancel {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 18px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
  }

  .btn-save {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 18px;
    border: 1px solid var(--gold-dim);
    border-radius: 2px;
    background: rgba(200,168,75,0.1);
    color: var(--gold);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-save:hover { background: rgba(200,168,75,0.2); border-color: var(--gold); }

  /* my pick select */
  select.form-input {
    appearance: none;
    cursor: pointer;
  }

  /* counter */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .stat-pill {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 2px;
  }

  .stat-pill.win { background: var(--win-bg); color: var(--win); }
  .stat-pill.lose { background: var(--lose-bg); color: var(--lose); }
  .stat-pill.even { background: var(--even-bg); color: var(--even); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="logo">JG <span>/</span> Matchups</div>
    </div>
  </header>

  <div class="section-label">Tu pick</div>
  <div class="picks-row" id="picks-row"></div>

  <div class="stats-row" id="stats-row"></div>

  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn f-all active" onclick="setFilter('all',this)">Todos</button>
      <button class="filter-btn f-win" onclick="setFilter('win',this)">Win</button>
      <button class="filter-btn f-even" onclick="setFilter('even',this)">Even</button>
      <button class="filter-btn f-lose" onclick="setFilter('lose',this)">Lose</button>
    </div>
    <button class="add-btn" onclick="openModal()">+ Agregar</button>
  </div>

  <div class="list" id="list"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nuevo matchup</div>
    <div class="form-group">
      <label class="form-label">Rival (enemy jungler)</label>
      <input class="form-input" id="inp-enemy" placeholder="ej: Hecarim, Lee Sin..." />
    </div>
    <div class="form-group">
      <label class="form-label">Tu pick</label>
      <select class="form-input" id="inp-mypick">
        <option value="">— cualquier pick —</option>
        <option value="Rengar">Rengar</option>
        <option value="Graves">Graves</option>
        <option value="Jarvan IV">Jarvan IV</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">¿Le ganás en early?</label>
      <div class="result-row">
        <div class="r-opt" id="r-win" onclick="selResult('win')">Win</div>
        <div class="r-opt" id="r-even" onclick="selResult('even')">Even</div>
        <div class="r-opt" id="r-lose" onclick="selResult('lose')">Lose</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Tip de early</label>
      <textarea class="form-input" id="inp-tip" placeholder="qué hacer, qué evitar, cuándo pelear..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEntry()">Guardar</button>
    </div>
  </div>
</div>

<script>
var MY_PICKS = ['Rengar','Graves','Jarvan IV'];
var CHAMP_IMG = {
  'Rengar': 'https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/Rengar.png',
  'Graves': 'https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/Graves.png',
  'Jarvan IV': 'https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/JarvanIV.png'
};
var selPick = 'all';
var selFilter = 'all';
var chosenResult = 'win';
var editIdx = null;

var data = [];
try {
  var s = localStorage.getItem('jg_matchups_v2');
  data = s ? JSON.parse(s) : [];
} catch(e) { data = []; }

function persist() {
  try { localStorage.setItem('jg_matchups_v2', JSON.stringify(data)); } catch(e) {}
}

function renderPicks() {
  var row = document.getElementById('picks-row');
  var html = '<button class="pick-chip' + (selPick==='all'?' active':'') + '" onclick="setPick(\'all\',this)">Todos</button>';
  MY_PICKS.forEach(function(p) {
    var img = CHAMP_IMG[p] ? '<img src="' + CHAMP_IMG[p] + '" alt="' + p + '" style="width:22px;height:22px;border-radius:50%;object-fit:cover;margin-right:6px;vertical-align:middle;" />' : '';
    html += '<button class="pick-chip' + (selPick===p?' active':'') + '" onclick="setPick(\'' + p.replace("'","\\'") + '\',this)">' + img + p + '</button>';
  });
  row.innerHTML = html;
}

function getFiltered() {
  return data.filter(function(d) {
    var matchPick = selPick === 'all' || d.myPick === selPick || d.myPick === '';
    var matchFilter = selFilter === 'all' || d.result === selFilter;
    return matchPick && matchFilter;
  });
}

function renderStats() {
  var src = selPick === 'all' ? data : data.filter(function(d){ return d.myPick === selPick || d.myPick === ''; });
  var w = src.filter(function(d){ return d.result==='win'; }).length;
  var l = src.filter(function(d){ return d.result==='lose'; }).length;
  var e = src.filter(function(d){ return d.result==='even'; }).length;
  var row = document.getElementById('stats-row');
  if (!src.length) { row.innerHTML = ''; return; }
  row.innerHTML =
    '<span class="stat-pill win">' + w + ' Win</span>' +
    '<span class="stat-pill even">' + e + ' Even</span>' +
    '<span class="stat-pill lose">' + l + ' Lose</span>';
}

function renderList() {
  var list = document.getElementById('list');
  var filtered = getFiltered();
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">Sin matchups para este filtro</div>';
    return;
  }
  var labels = { win: 'Win early', lose: 'Lose early', even: 'Even' };
  list.innerHTML = filtered.map(function(d) {
    var realIdx = data.indexOf(d);
    return '<div class="card r-' + d.result + '">' +
      '<div class="card-top">' +
        '<div class="enemy-name">' + d.enemy + '</div>' +
        (d.myPick ? '<span class="my-pick-tag">' + d.myPick + '</span>' : '') +
        '<span class="result-badge ' + d.result + '">' + labels[d.result] + '</span>' +
      '</div>' +
      (d.tip ? '<div class="tip-text">' + d.tip + '</div>' : '') +
      '<div class="card-actions">' +
        '<button class="act-btn" onclick="editEntry(' + realIdx + ')">Editar</button>' +
        '<button class="act-btn del" onclick="delEntry(' + realIdx + ')">Eliminar</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function render() { renderPicks(); renderStats(); renderList(); }

function setPick(p) {
  selPick = p;
  document.querySelectorAll('.pick-chip').forEach(function(b){ b.classList.remove('active'); });
  event.target.classList.add('active');
  render();
}

function setFilter(f, btn) {
  selFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderStats(); renderList();
}

function openModal(idx) {
  editIdx = typeof idx === 'number' ? idx : null;
  var d = editIdx !== null ? data[editIdx] : null;
  document.getElementById('modal-title').textContent = d ? 'Editar matchup' : 'Nuevo matchup';
  document.getElementById('inp-enemy').value = d ? d.enemy : '';
  document.getElementById('inp-mypick').value = d ? (d.myPick || '') : (selPick !== 'all' ? selPick : '');
  document.getElementById('inp-tip').value = d ? d.tip : '';
  selResultFn(d ? d.result : 'win');
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function selResultFn(r) {
  chosenResult = r;
  ['win','even','lose'].forEach(function(x) {
    document.getElementById('r-' + x).className = 'r-opt' + (x===r ? ' sel-'+x : '');
  });
}

window.selResult = function(r) { selResultFn(r); };

function saveEntry() {
  var enemy = document.getElementById('inp-enemy').value.trim();
  if (!enemy) return;
  var entry = {
    enemy: enemy,
    myPick: document.getElementById('inp-mypick').value,
    result: chosenResult,
    tip: document.getElementById('inp-tip').value.trim()
  };
  if (editIdx !== null) { data[editIdx] = entry; } else { data.unshift(entry); }
  persist();
  closeModal();
  render();
}

function editEntry(idx) { openModal(idx); }
function delEntry(idx) {
  if (!confirm('¿Eliminar este matchup?')) return;
  data.splice(idx, 1);
  persist();
  render();
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

render();
</script>
</body>
</html>
