
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { padding: 1rem 0; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
.title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.subtitle { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.add-btn { font-size: 13px; padding: 6px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; }
.add-btn:hover { background: var(--color-background-secondary); }
.filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-btn { font-size: 12px; padding: 4px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: 99px; background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.filter-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-secondary); }
.list { display: flex; flex-direction: column; gap: 8px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 14px; }
.card-top { display: flex; align-items: center; gap: 10px; }
.champ-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
.champ-circle.win { background: #EAF3DE; color: #3B6D11; }
.champ-circle.lose { background: #FCEBEB; color: #A32D2D; }
.champ-circle.even { background: #F1EFE8; color: #5F5E5A; }
.card-info { flex: 1; min-width: 0; }
.champ-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.champ-role { font-size: 11px; color: var(--color-text-secondary); }
.badge { font-size: 11px; padding: 2px 9px; border-radius: 99px; font-weight: 500; flex-shrink: 0; }
.badge.win { background: #EAF3DE; color: #3B6D11; }
.badge.lose { background: #FCEBEB; color: #A32D2D; }
.badge.even { background: #F1EFE8; color: #5F5E5A; }
.tip { font-size: 12px; color: var(--color-text-secondary); margin-top: 6px; line-height: 1.5; }
.card-actions { display: flex; gap: 6px; margin-top: 8px; }
.act-btn { font-size: 11px; padding: 3px 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.act-btn:hover { color: var(--color-text-primary); border-color: var(--color-border-secondary); }
.act-btn.del:hover { color: #A32D2D; border-color: #A32D2D; }

.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
.modal { background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-secondary); padding: 1.25rem; width: 100%; max-width: 420px; }
.modal-title { font-size: 14px; font-weight: 500; margin-bottom: 1rem; color: var(--color-text-primary); }
.form-group { margin-bottom: 12px; }
.form-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; display: block; }
.form-input { width: 100%; padding: 7px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; background: transparent; color: var(--color-text-primary); font-family: var(--font-sans); }
.form-input:focus { outline: none; border-color: var(--color-border-primary); }
.radio-row { display: flex; gap: 8px; }
.radio-opt { flex: 1; padding: 7px 0; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); text-align: center; font-size: 12px; cursor: pointer; color: var(--color-text-secondary); }
.radio-opt.selected.win { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }
.radio-opt.selected.lose { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
.radio-opt.selected.even { background: #F1EFE8; color: #5F5E5A; border-color: #B4B2A9; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; }
.btn-cancel { padding: 6px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); font-size: 13px; cursor: pointer; }
.btn-save { padding: 6px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); font-size: 13px; cursor: pointer; font-weight: 500; }
.btn-save:hover { background: var(--color-background-secondary); }
.empty { text-align: center; padding: 2rem 0; color: var(--color-text-secondary); font-size: 13px; }
.my-pick { font-size: 11px; color: var(--color-text-secondary); background: var(--color-background-secondary); padding: 2px 7px; border-radius: 99px; display: inline-block; margin-left: 6px; }
</style>

<div class="app">
  <div class="header">
    <div>
      <div class="title">Jungle Matchup Notes</div>
      <div class="subtitle">Tips de early game — Diamond 3</div>
    </div>
    <button class="add-btn" onclick="openModal()">+ Agregar matchup</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('win', this)">Win</button>
    <button class="filter-btn" onclick="setFilter('lose', this)">Lose</button>
    <button class="filter-btn" onclick="setFilter('even', this)">Even</button>
  </div>

  <div class="list" id="list"></div>
</div>

<div class="modal-bg" id="modal" style="display:none;">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nuevo matchup</div>
    <div class="form-group">
      <label class="form-label">Rival</label>
      <input class="form-input" id="inp-enemy" placeholder="ej: Graves, Vi, Hecarim..." />
    </div>
    <div class="form-group">
      <label class="form-label">Tu pick</label>
      <input class="form-input" id="inp-mypick" placeholder="ej: Kha'Zix, Shaco..." />
    </div>
    <div class="form-group">
      <label class="form-label">¿Le ganás en early?</label>
      <div class="radio-row">
        <div class="radio-opt win" id="r-win" onclick="selectResult('win')">Win</div>
        <div class="radio-opt even" id="r-even" onclick="selectResult('even')">Even</div>
        <div class="radio-opt lose" id="r-lose" onclick="selectResult('lose')">Lose</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Tip de early (qué hacer o evitar)</label>
      <textarea class="form-input" id="inp-tip" rows="3" placeholder="ej: Invadelo en su segundo camp, no pelea nivel 3..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEntry()">Guardar</button>
    </div>
  </div>
</div>

<script>
var data = [];
var editIdx = null;
var selectedResult = 'win';
var currentFilter = 'all';

var defaults = [
  { enemy: 'Vi', myPick: 'Kha\'Zix', result: 'lose', tip: 'Evitá pelea directa antes de nivel 6. Colate sus camps y huí. Post-6 podés buscar picks si ella no tiene R disponible.' },
  { enemy: 'Graves', myPick: 'Shaco', result: 'lose', tip: 'No invadas su lado temprano. Boxea tiene más burst en 1v1. Jugate por skirmishes 2v2 con tu laners.' },
  { enemy: 'Hecarim', myPick: 'Nidalee', result: 'even', tip: 'Le ganas de lejos, pierde si entra. Kitealo con Q, nunca te quedes quieta. Warda sus flancos tempranos.' },
  { enemy: 'Amumu', myPick: 'Shaco', result: 'win', tip: 'Cleareas mucho más rápido. Invadelo antes de que llegue a su segundo camp. Con boxes bloqueás su Q.' }
];

try {
  var saved = localStorage.getItem('jg_matchups');
  data = saved ? JSON.parse(saved) : defaults;
} catch(e) { data = defaults; }

function save() {
  try { localStorage.setItem('jg_matchups', JSON.stringify(data)); } catch(e) {}
  render();
}

function initials(name) {
  return name.split(' ').map(function(w){ return w[0]; }).join('').slice(0,2).toUpperCase();
}

function render() {
  var list = document.getElementById('list');
  var filtered = currentFilter === 'all' ? data : data.filter(function(d){ return d.result === currentFilter; });
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">No hay matchups guardados para este filtro.</div>';
    return;
  }
  list.innerHTML = filtered.map(function(d, fi) {
    var realIdx = data.indexOf(d);
    var labels = { win: 'Win early', lose: 'Lose early', even: 'Even' };
    return '<div class="card">' +
      '<div class="card-top">' +
        '<div class="champ-circle ' + d.result + '">' + initials(d.enemy) + '</div>' +
        '<div class="card-info">' +
          '<div class="champ-name">' + d.enemy + (d.myPick ? '<span class="my-pick">' + d.myPick + '</span>' : '') + '</div>' +
        '</div>' +
        '<span class="badge ' + d.result + '">' + labels[d.result] + '</span>' +
      '</div>' +
      (d.tip ? '<div class="tip">' + d.tip + '</div>' : '') +
      '<div class="card-actions">' +
        '<button class="act-btn" onclick="editEntry(' + realIdx + ')">Editar</button>' +
        '<button class="act-btn del" onclick="deleteEntry(' + realIdx + ')">Eliminar</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function openModal(idx) {
  editIdx = typeof idx === 'number' ? idx : null;
  var d = editIdx !== null ? data[editIdx] : null;
  document.getElementById('modal-title').textContent = d ? 'Editar matchup' : 'Nuevo matchup';
  document.getElementById('inp-enemy').value = d ? d.enemy : '';
  document.getElementById('inp-mypick').value = d ? (d.myPick || '') : '';
  document.getElementById('inp-tip').value = d ? d.tip : '';
  selectResult(d ? d.result : 'win');
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function selectResult(r) {
  selectedResult = r;
  ['win','even','lose'].forEach(function(x){
    var el = document.getElementById('r-' + x);
    el.className = 'radio-opt ' + x + (x === r ? ' selected' : '');
  });
}

function saveEntry() {
  var enemy = document.getElementById('inp-enemy').value.trim();
  if (!enemy) return;
  var entry = {
    enemy: enemy,
    myPick: document.getElementById('inp-mypick').value.trim(),
    result: selectedResult,
    tip: document.getElementById('inp-tip').value.trim()
  };
  if (editIdx !== null) {
    data[editIdx] = entry;
  } else {
    data.unshift(entry);
  }
  save();
  closeModal();
}

function editEntry(idx) { openModal(idx); }

function deleteEntry(idx) {
  data.splice(idx, 1);
  save();
}

render();
</script>
